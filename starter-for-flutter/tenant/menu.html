<!-- tenant/menu.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Menu - Dasbor Tenant</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="header">
        <a href="dashboard.html">&larr; Kembali ke Dasbor</a>
        <h1>Kelola Menu</h1>
    </div>
    <div class="container">
        <div class="card">
            <a href="edit-product.html" class="btn btn-primary" style="margin-bottom: 20px;">Tambah Produk Baru</a>
            <div class="product-list" id="product-list-container">
                <!-- Daftar produk tenant akan dimuat di sini -->
            </div>
        </div>
    </div>
    <script src="../app.js"></script>
    <script>
        const tenantId = 1; // ID Tenant yang sedang login (simulasi)
        const products = FAKE_DATA.products[tenantId] || [];
        const container = document.getElementById('product-list-container');

        products.forEach(product => {
            container.innerHTML += `
                <div class="product-item">
                    <div class="info">
                        <h4>${product.name}</h4>
                        <p>${product.desc}</p>
                        <span class="price">Rp ${product.price.toLocaleString('id-ID')}</span>
                        <div>
                            <label>
                                <input type="checkbox" ${product.available ? 'checked' : ''} onclick="alert('Status ketersediaan diubah!')">
                                Tersedia
                            </label>
                        </div>
                    </div>
                    <div>
                        <a href="edit-product.html?productId=${product.id}" class="btn btn-secondary btn-sm" style="margin-bottom: 5px;">Edit</a>
                        <button class="btn btn-danger btn-sm" onclick="alert('Produk ${product.name} dihapus!')">Hapus</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
