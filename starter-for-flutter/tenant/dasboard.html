<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasbor Tenant</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="header">
        <h1>Pesanan Masuk</h1>
        <a href="menu.html">Kelola Menu</a>
    </div>
    <div class="container">
         <div class="tabs">
            <div class="tab active">Baru (1)</div>
            <div class="tab">Disiapkan (1)</div>
            <div class="tab">Siap Diambil (1)</div>
        </div>
        
        <!-- Pesanan Baru -->
        <div class="card">
            <div class="card-header">
                <h4>Pesanan #ORD-001 <span class="order-status status-new">Baru</span></h4>
                <small>Dari: Rian</small>
            </div>
            <p>2x Soto Ayam Spesial, 1x Es Teh</p>
            <p><b>Total: Rp 45.000</b></p>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" style="flex-grow: 1;" onclick="alert('Pesanan ORD-001 diterima!')">Terima</button>
                <button class="btn btn-danger" style="flex-grow: 1;" onclick="alert('Pesanan ORD-001 ditolak!')">Tolak</button>
            </div>
        </div>

        <!-- Pesanan Disiapkan -->
         <div class="card">
            <div class="card-header">
                <h4>Pesanan #ORD-002 <span class="order-status status-preparing">Disiapkan</span></h4>
                 <small>Dari: Andi</small>
            </div>
            <p>1x Nasi Goreng Ayam</p>
            <button class="btn btn-primary" onclick="alert('Status ORD-002 diubah menjadi Siap Diambil!')">Tandai Siap Diambil</button>
        </div>

    </div>
    <script src="../app.js"></script>
</body>
</html>
