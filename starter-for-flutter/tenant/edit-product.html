<!-- tenant/edit-product.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Produk</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="header">
        <a href="menu.html">&larr; Batal</a>
        <h1 id="page-title">Tambah Produk</h1>
    </div>
    <div class="container">
        <div class="card">
            <form onsubmit="event.preventDefault(); saveProduct();">
                <div class="form-group">
                    <label for="product-name">Nama Produk</label>
                    <input type="text" id="product-name" required>
                </div>
                <div class="form-group">
                    <label for="product-desc">Deskripsi</label>
                    <textarea id="product-desc" rows="3" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
                </div>
                <div class="form-group">
                    <label for="product-price">Harga</label>
                    <input type="number" id="product-price" required>
                </div>
                <div class="form-group">
                    <label for="product-category">Kategori</label>
                    <select id="product-category" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <!-- Opsi kategori akan dimuat di sini -->
                    </select>
                </div>
                 <div class="form-group">
                    <label for="product-image">Foto Produk</label>
                    <input type="file" id="product-image">
                </div>
                <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
            </form>
        </div>
    </div>
    <script src="../app.js"></script>
    <script>
        const productId = getQueryParam('productId');
        const pageTitle = document.getElementById('page-title');
        const productNameInput = document.getElementById('product-name');
        const productDescInput = document.getElementById('product-desc');
        const productPriceInput = document.getElementById('product-price');
        
        // Muat kategori ke dropdown
        const categorySelect = document.getElementById('product-category');
        FAKE_DATA.categories.forEach(cat => {
            categorySelect.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
        });

        if (productId) {
            pageTitle.textContent = "Edit Produk";
            // Simulasi: temukan produk dan isi form
            const product = FAKE_DATA.products[1].find(p => p.id == productId);
            if(product) {
                productNameInput.value = product.name;
                productDescInput.value = product.desc;
                productPriceInput.value = product.price;
            }
        }

        function saveProduct() {
            alert('Produk berhasil disimpan!');
            navigateTo('menu.html');
        }
    </script>
</body>
</html>
