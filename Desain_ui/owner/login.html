<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Owner - Kantin Digital</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="login-container">
        <div class="card" style="width: 320px;">
            <h1 style="text-align: center; color: var(--primary-color);">Login Owner</h1>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" value="owner@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="password">
            </div>
            <button class="btn btn-primary" onclick="navigateTo('dashboard.html')">Login</button>
        </div>
    </div>
    <script src="../app.js"></script>
</body>
</html>
