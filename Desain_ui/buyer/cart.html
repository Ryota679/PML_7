<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja - Kantin Digital</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="header">
        <h1><a href="home.html" style="text-decoration: none; color: inherit;">Kantin Digital</a></h1>
        <a href="../index.html">Logout</a>
    </div>
    <div class="container">
        <div class="card">
            <div id="cart-items">
                <!-- Item keranjang akan dimuat di sini -->
            </div>
            <div class="cart-summary" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee;">
                <p>Total: <strong id="cart-total">Rp 0</strong></p>
                <button class="btn btn-primary" onclick="checkout()">Checkout</button>
                <button class="btn btn-secondary" onclick="clearCartAndRender()">Bersihkan Keranjang</button>
            </div>
        </div>
    </div>
    <script src="../app.js"></script>
    <script>
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalElement = document.getElementById('cart-total');

        function renderCart() {
            const cart = getCart();
            cartItemsContainer.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color: #888;">Keranjang belanja kosong.</p>';
                cartTotalElement.textContent = 'Rp 0';
                return;
            }

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                cartItemsContainer.innerHTML += `
                    <div class="product-item" style="margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                        <div class="info">
                            <h4>${item.productName}</h4>
                            <p>Rp ${item.price.toLocaleString('id-ID')}</p>
                            <div style="display: flex; align-items: center; margin-top: 5px;">
                                <button class="btn btn-sm" onclick="decreaseQuantityAndRender(${item.tenantId}, ${item.productId})"><i class="fas fa-minus"></i></button>
                                <span style="margin: 0 10px;">${item.quantity}</span>
                                <button class="btn btn-sm" onclick="increaseQuantityAndRender(${item.tenantId}, ${item.productId})"><i class="fas fa-plus"></i></button>
                                <button class="btn btn-danger btn-sm" style="margin-left: 15px;" onclick="removeItemAndRender(${item.tenantId}, ${item.productId})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div style="font-weight: bold;">Rp ${itemTotal.toLocaleString('id-ID')}</div>
                    </div>
                `;
            });
            cartTotalElement.textContent = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function increaseQuantityAndRender(tenantId, productId) {
            increaseQuantity(tenantId, productId);
            renderCart();
        }

        function decreaseQuantityAndRender(tenantId, productId) {
            decreaseQuantity(tenantId, productId);
            renderCart();
        }

        function removeItemAndRender(tenantId, productId) {
            removeItem(tenantId, productId);
            renderCart();
        }

        function checkout() {
            const buyerName = prompt("Masukkan nama Anda untuk pesanan ini:", window.currentBuyerName || "Pembeli Anonim");
            if (buyerName) {
                saveCurrentBuyerNameToLocalStorage(buyerName); // Save buyer name to localStorage
                const newOrderIds = placeOrder(buyerName);
                if (newOrderIds && newOrderIds.length > 0) {
                    alert("Pesanan Anda telah berhasil dibuat!");
                    navigateTo('orders.html'); // Redirect to buyer's orders page
                }
            }
        }

        function clearCartAndRender() {
            clearCart();
            renderCart();
        }

        renderCart();
        updateCartCount();
    </script>
</body>
</html>
